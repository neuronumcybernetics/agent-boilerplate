<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Employee Agent</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #040404;
      font-family: 'Inter', sans-serif;
      color: white;
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ── Main area ───────────────────────────────────────────────────────────── */

    .main-area {
      flex: 1;
      display: none;
      position: relative;
      overflow: hidden;
    }

    .main-area.visible { display: block; }

    /* ── Results panel (above input, hidden until first send) ────────────────── */

    .results-panel {
      position: absolute;
      top: 80px;
      left: 50%;
      transform: translateX(-50%);
      width: min(860px, calc(100% - 40px));
      bottom: 100px;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 10px;
      padding: 0 0 8px;
      scrollbar-width: none;
      z-index: 1;
      opacity: 0;
      pointer-events: none;
    }

    .results-panel.has-results {
      opacity: 1;
      pointer-events: all;
    }

    .results-panel::-webkit-scrollbar { display: none; }

    /* ── Input dock: centered by default, slides to bottom on first send ─────── */

    .command-center {
      position: absolute;
      left: 50%;
      transform: translate(-50%, -50%);
      top: 50%;
      width: min(560px, calc(100% - 40px));
      display: flex;
      flex-direction: column;
      align-items: center;
      z-index: 2;
      pointer-events: none;
      transition: top 0.35s cubic-bezier(0.4, 0, 0.2, 1),
                  transform 0.35s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .command-center.docked {
      top: 100%;
      transform: translate(-50%, -100%);
      padding-bottom: 16px;
    }

    .command-center > * { pointer-events: all; }

    .command-wrap {
      width: 100%;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 14px;
      display: flex;
      flex-direction: column;
      padding: 0 14px;
      transition: border-color 0.2s, background 0.2s;
    }

    .input-row {
      display: flex;
      align-items: center;
    }

    .command-wrap:focus-within {
      border-color: rgba(255, 255, 255, 0.22);
      background: rgba(255, 255, 255, 0.07);
    }

    textarea {
      flex: 1;
      background: transparent;
      border: none;
      outline: none;
      color: rgba(255, 255, 255, 0.9);
      font-size: 13px;
      font-family: 'Inter', sans-serif;
      resize: none;
      padding: 14px 0;
      max-height: 120px;
      line-height: 1.5;
      scrollbar-width: none;
    }

    textarea::-webkit-scrollbar { display: none; }
    textarea::placeholder { color: rgba(255, 255, 255, 0.2); }

    .attach-btn {
      background: none;
      border: none;
      color: rgba(255, 255, 255, 0.25);
      cursor: pointer;
      font-size: 15px;
      padding: 4px 12px 4px 0px;
      border-radius: 6px;
      transition: color 0.15s;
      flex-shrink: 0;
    }

    .attach-btn:hover { color: rgba(255, 255, 255, 0.6); }
    .attach-btn:disabled { opacity: 0.3; cursor: not-allowed; }

    #attach-badge {
      display: flex;
      align-items: center;
      gap: 5px;
      padding: 3px 8px 3px 8px;
      margin: 8px 0 0;
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.06);
      border: 1px solid rgba(255, 255, 255, 0.1);
      font-size: 11px;
      color: rgba(255, 255, 255, 0.5);
      white-space: nowrap;
      overflow: hidden;
      max-width: 100%;
      flex-shrink: 0;
      align-self: flex-start;
    }

    #attach-badge span {
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 200px;
    }

    #remove-attach {
      background: none;
      border: none;
      color: rgba(255, 255, 255, 0.3);
      cursor: pointer;
      font-size: 10px;
      padding: 0 0 0 2px;
      line-height: 1;
      flex-shrink: 0;
      transition: color 0.15s;
    }

    #remove-attach:hover { color: rgba(255, 255, 255, 0.7); }

    .send-btn {
      background: none;
      border: 1px solid rgba(255, 255, 255, 0.18);
      color: rgba(255, 255, 255, 0.35);
      cursor: pointer;
      font-size: 15px;
      padding: 4px 8px;
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: color 0.15s;
    }

    .send-btn:hover:not(:disabled) { color: rgba(255, 255, 255, 0.8); }
    .send-btn:disabled { opacity: 0.25; cursor: not-allowed; }

    /* ── Views ───────────────────────────────────────────────────────────────── */

    /* ── Task card ───────────────────────────────────────────────────────────── */

    .task-card {
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 14px;
      padding: 14px 16px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      transition: border-color 0.2s, background 0.2s;
    }

    .task-card.active {
      border-color: rgba(255, 255, 255, 0.16);
      background: rgba(255, 255, 255, 0.04);
    }

    .task-query {
      font-size: 13px;
      color: rgba(255, 255, 255, 0.75);
      line-height: 1.5;
    }

    .task-divider {
      height: 1px;
      background: rgba(255, 255, 255, 0.06);
    }

    .task-status {
      font-size: 12px;
      color: rgba(255, 255, 255, 0.25);
      font-style: italic;
      display: flex;
      align-items: center;
      gap: 7px;
    }

    .spinner {
      width: 10px;
      height: 10px;
      border: 1.5px solid rgba(255,255,255,0.15);
      border-top-color: rgba(255,255,255,0.5);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      flex-shrink: 0;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .suggestions-list {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .suggestion-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 8px 10px;
      border-radius: 10px;
      border: 1px solid rgba(255, 255, 255, 0.07);
      background: rgba(255, 255, 255, 0.02);
      transition: border-color 0.15s;
    }

    .suggestion-row:hover { border-color: rgba(255, 255, 255, 0.13); }

    .suggestion-agent {
      display: flex;
      align-items: center;
      gap: 10px;
      overflow: hidden;
    }

    .agent-logo {
      width: 32px;
      height: 32px;
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.07);
      border: 1px solid rgba(255, 255, 255, 0.1);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      flex-shrink: 0;
      overflow: hidden;
    }

    .agent-logo img { width: 100%; height: 100%; object-fit: cover; }

    .agent-info { display: flex; flex-direction: column; gap: 2px; overflow: hidden; }

    .agent-name-row {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .agent-name {
      font-size: 13px;
      font-weight: 600;
      color: rgba(255, 255, 255, 0.85);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .verified-badge {
      font-size: 10px;
      font-weight: 500;
      color: rgba(74, 222, 128, 0.85);
      display: flex;
      align-items: center;
      gap: 3px;
      flex-shrink: 0;
    }

    .unverified-badge {
      font-size: 10px;
      font-weight: 500;
      color: rgba(251, 191, 36, 0.75);
      display: flex;
      align-items: center;
      gap: 3px;
      flex-shrink: 0;
    }

    .agent-sub {
      font-size: 11px;
      color: rgba(255, 255, 255, 0.28);
      font-family: monospace;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .suggestion-actions { display: flex; gap: 6px; flex-shrink: 0; }

    .confirm-btn, .dismiss-btn {
      padding: 6px 14px;
      border-radius: 8px;
      font-size: 12px;
      font-weight: 500;
      cursor: pointer;
      border: 1px solid transparent;
      transition: all 0.15s;
      white-space: nowrap;
    }

    .confirm-btn {
      background: rgba(255, 255, 255, 0.07);
      color: rgba(255, 255, 255, 0.7);
      border-color: rgba(255, 255, 255, 0.15);
    }

    .confirm-btn:hover:not(:disabled) { background: rgba(255, 255, 255, 0.12); }
    .confirm-btn:disabled, .dismiss-btn:disabled { opacity: 0.4; cursor: not-allowed; }


.dismiss-btn {
      background: rgba(255, 255, 255, 0.04);
      color: rgba(255, 255, 255, 0.35);
      border-color: rgba(255, 255, 255, 0.08);
    }

    .dismiss-btn:hover:not(:disabled) {
      background: rgba(255, 255, 255, 0.08);
      color: rgba(255, 255, 255, 0.6);
    }

    .task-result {
      font-size: 13px;
      color: rgba(255, 255, 255, 0.7);
      line-height: 1.6;
    }

    .task-result p { margin: 0 0 8px; }
    .task-result p:last-child { margin-bottom: 0; }
    .task-result ul, .task-result ol { padding-left: 18px; margin: 0 0 8px; }
    .task-result li { margin-bottom: 3px; }
    .task-result code {
      background: rgba(255,255,255,0.07);
      border-radius: 4px;
      padding: 1px 5px;
      font-size: 12px;
      font-family: monospace;
    }
    .task-result pre {
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 8px;
      padding: 10px 12px;
      overflow-x: auto;
      margin: 0 0 8px;
    }
    .task-result pre code { background: none; padding: 0; font-size: 12px; }
    .task-result h1, .task-result h2, .task-result h3 {
      font-size: 13px;
      font-weight: 600;
      color: rgba(255,255,255,0.85);
      margin: 10px 0 4px;
    }
    .task-result strong { color: rgba(255,255,255,0.85); }
    .task-result a { color: rgba(255,255,255,0.55); text-decoration: underline; }
    .task-result blockquote {
      border-left: 2px solid rgba(255,255,255,0.15);
      padding-left: 10px;
      color: rgba(255,255,255,0.45);
      margin: 0 0 8px;
    }

    .file-name {
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: rgba(255,255,255,0.3);
      margin-top: 10px;
      margin-bottom: 4px;
    }

    .task-file-card {
      margin-top: 10px;
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 14px;
      border-radius: 10px;
      border: 1px solid rgba(255,255,255,0.08);
      background: rgba(255,255,255,0.03);
      font-size: 12px;
      color: rgba(255,255,255,0.5);
      cursor: pointer;
      transition: border-color 0.15s, background 0.15s;
    }

    .task-file-card:hover {
      border-color: rgba(255,255,255,0.16);
      background: rgba(255,255,255,0.06);
      color: rgba(255,255,255,0.75);
    }

    .task-file-card span { flex: 1; }

    .file-modal {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 1000;
      background: rgba(0,0,0,0.75);
      backdrop-filter: blur(4px);
      align-items: center;
      justify-content: center;
    }

    .file-modal.open { display: flex; }

    .file-modal-inner {
      position: relative;
      width: min(860px, calc(100% - 40px));
      height: calc(100vh - 80px);
      border-radius: 14px;
      overflow: hidden;
      border: 1px solid rgba(255,255,255,0.1);
    }

    .file-modal-inner iframe {
      width: 100%;
      height: 100%;
      border: none;
    }

    .file-modal-close {
      position: absolute;
      top: 12px;
      right: 12px;
      background: rgba(0,0,0,0.6);
      border: 1px solid rgba(255,255,255,0.15);
      color: rgba(255,255,255,0.7);
      border-radius: 8px;
      padding: 6px 12px;
      font-size: 12px;
      cursor: pointer;
      z-index: 1;
      transition: background 0.15s;
    }

    .file-modal-close:hover { background: rgba(0,0,0,0.85); }

    .task-image-preview {
      margin-top: 10px;
      width: 100%;
      height: 480px;
      border-radius: 10px;
      border: 1px solid rgba(255,255,255,0.08);
      display: block;
    }

    .task-csv-preview {
      margin-top: 10px;
      overflow-x: auto;
      border-radius: 10px;
      border: 1px solid rgba(255,255,255,0.08);
    }

    .task-csv-preview table {
      width: 100%;
      border-collapse: collapse;
      font-size: 12px;
    }

    .task-csv-preview th {
      padding: 8px 12px;
      text-align: left;
      font-weight: 600;
      color: rgba(255,255,255,0.5);
      background: rgba(255,255,255,0.04);
      border-bottom: 1px solid rgba(255,255,255,0.08);
      white-space: nowrap;
    }

    .task-csv-preview td {
      padding: 7px 12px;
      color: rgba(255,255,255,0.7);
      border-bottom: 1px solid rgba(255,255,255,0.04);
      white-space: nowrap;
    }

    .task-csv-preview tr:last-child td { border-bottom: none; }

    .result-tag {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      font-size: 10px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: rgba(255, 255, 255, 0.3);
      margin-bottom: 6px;
    }

    .result-actions {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 4px;
    }

    .copy-btn {
      background: none;
      border: none;
      color: rgba(255,255,255,0.2);
      cursor: pointer;
      font-size: 12px;
      padding: 4px 6px;
      border-radius: 6px;
      transition: color 0.15s;
      display: flex;
      align-items: center;
      gap: 5px;
    }

    .copy-btn:hover { color: rgba(255,255,255,0.55); }
    .copy-btn.copied { color: rgba(255,255,255,0.5); }

    .close-btn {
      padding: 6px 12px;
      border-radius: 8px;
      font-size: 12px;
      font-weight: 500;
      cursor: pointer;
      border: 1px solid rgba(255, 255, 255, 0.08);
      background: rgba(255, 255, 255, 0.04);
      color: rgba(255, 255, 255, 0.35);
      transition: all 0.15s;
      white-space: nowrap;
      flex-shrink: 0;
    }

    .close-btn:hover {
      background: rgba(255, 255, 255, 0.08);
      color: rgba(255, 255, 255, 0.6);
    }

    /* ── Agent greeting ──────────────────────────────────────────────────────── */

    .agent-greeting {
      font-size: 18px;
      font-weight: 600;
      color: rgba(255, 255, 255, 0.55);
      text-align: center;
      margin-bottom: 14px;
      letter-spacing: -0.01em;
    }

    /* ── Slider nav ──────────────────────────────────────────────────────────── */

    .slider-nav {
      position: fixed;
      top: 16px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.09);
      border-radius: 10px;
      padding: 3px;
      gap: 2px;
      z-index: 100;
    }

    .slider-tab {
      padding: 5px 16px;
      border-radius: 7px;
      font-size: 12px;
      font-weight: 500;
      color: rgba(255, 255, 255, 0.35);
      background: none;
      border: none;
      cursor: pointer;
      transition: color 0.15s, background 0.15s;
      white-space: nowrap;
    }

    .slider-tab:hover { color: rgba(255, 255, 255, 0.6); }

    .slider-tab.active {
      background: rgba(255, 255, 255, 0.08);
      color: rgba(255, 255, 255, 0.85);
    }

    /* ── Finished tasks view ─────────────────────────────────────────────────── */

    #view-done, #view-open, #view-tasks {
      position: absolute;
      inset: 0;
      display: none;
      flex-direction: column;
      padding-top: 60px;
    }

    #view-done.visible, #view-open.visible, #view-tasks.visible { display: flex; }

    #view-tasks .done-grid {
      grid-template-columns: 1fr;
      max-width: 860px;
      margin: 0 auto;
      width: 100%;
      padding: 0 20px;
    }

    .open-card-pending {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 11px;
      color: rgba(255, 255, 255, 0.35);
    }

    .open-card-spinner {
      width: 10px;
      height: 10px;
      border: 1.5px solid rgba(255,255,255,0.15);
      border-top-color: rgba(255,255,255,0.5);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      flex-shrink: 0;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .done-scroll {
      flex: 1;
      overflow-y: auto;
      padding: 0 20px 20px;
      scrollbar-width: none;
    }

    .done-scroll::-webkit-scrollbar { display: none; }

    .done-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 10px;
      max-width: 760px;
      margin: 0 auto;
    }

    .done-card {
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid rgba(255, 255, 255, 0.07);
      border-radius: 12px;
      padding: 12px 14px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .done-card-query {
      font-size: 12px;
      font-weight: 600;
      color: rgba(255, 255, 255, 0.7);
      line-height: 1.4;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .done-card-answer {
      font-size: 11px;
      color: rgba(255, 255, 255, 0.35);
      line-height: 1.5;
      display: -webkit-box;
      -webkit-line-clamp: 4;
      line-clamp: 4;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .done-card-meta {
      font-size: 10px;
      color: rgba(255, 255, 255, 0.2);
      display: flex;
      justify-content: space-between;
      margin-top: auto;
    }

    .done-empty {
      text-align: center;
      color: rgba(255, 255, 255, 0.18);
      font-size: 13px;
      margin-top: 40px;
    }

    .done-loading {
      text-align: center;
      color: rgba(255, 255, 255, 0.18);
      font-size: 12px;
      font-style: italic;
      margin-top: 40px;
    }

    .nav-search-divider {
      width: 1px;
      align-self: stretch;
      background: rgba(255, 255, 255, 0.1);
      margin: 4px 6px;
      flex-shrink: 0;
    }

    .search-expand-wrap {
      display: flex;
      align-items: center;
    }

    .nav-search {
      background: transparent;
      border: none;
      outline: none;
      font-size: 12px;
      font-family: 'Inter', sans-serif;
      color: rgba(255, 255, 255, 0.75);
      width: 140px;
      padding: 4px 0;
    }

    .nav-search::placeholder { color: rgba(255, 255, 255, 0.2); }

    /* ── Search results panel ────────────────────────────────────────────────── */

    .search-results-panel {
      position: fixed;
      top: 54px;
      left: 50%;
      transform: translateX(-50%);
      width: min(520px, calc(100% - 40px));
      background: rgba(12, 12, 12, 0.96);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 12px;
      backdrop-filter: blur(16px);
      z-index: 200;
      overflow: hidden;
      display: none;
    }

    .search-results-panel.open { display: block; }

    .search-result-item {
      display: flex;
      flex-direction: column;
      gap: 3px;
      padding: 10px 16px;
      cursor: pointer;
      border-bottom: 1px solid rgba(255, 255, 255, 0.05);
      transition: background 0.12s;
    }

    .search-result-item:last-child { border-bottom: none; }
    .search-result-item:hover { background: rgba(255, 255, 255, 0.05); }

    .search-result-item.active { background: rgba(255, 255, 255, 0.07); }

    .search-result-query {
      font-size: 12px;
      font-weight: 600;
      color: rgba(255, 255, 255, 0.8);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .search-result-snippet {
      font-size: 11px;
      color: rgba(255, 255, 255, 0.3);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .search-result-tag {
      font-size: 10px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: rgba(255, 255, 255, 0.2);
      margin-top: 1px;
    }

    .search-empty {
      padding: 20px 16px;
      font-size: 12px;
      color: rgba(255, 255, 255, 0.25);
      text-align: center;
    }

    .search-filters {
      display: flex;
      gap: 5px;
      padding: 10px 12px 8px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.06);
    }

    .search-filter-badge {
      padding: 3px 10px;
      border-radius: 20px;
      font-size: 11px;
      font-weight: 500;
      cursor: pointer;
      border: 1px solid rgba(255, 255, 255, 0.1);
      background: none;
      color: rgba(255, 255, 255, 0.3);
      transition: all 0.15s;
    }

    .search-filter-badge:hover { color: rgba(255, 255, 255, 0.6); border-color: rgba(255, 255, 255, 0.2); }

    .search-filter-badge.active {
      background: rgba(255, 255, 255, 0.08);
      border-color: rgba(255, 255, 255, 0.2);
      color: rgba(255, 255, 255, 0.85);
    }

    .done-card {
      cursor: pointer;
      transition: border-color 0.15s, background 0.15s;
    }

    .done-card:hover { border-color: rgba(255, 255, 255, 0.14); }

    .done-card.expanded {
      grid-column: 1 / -1;
      cursor: default;
    }

    .done-card.expanded .done-card-query {
      -webkit-line-clamp: unset;
      line-clamp: unset;
      display: block;
    }

    .done-card-full-answer {
      display: none;
      font-size: 12px;
      color: rgba(255, 255, 255, 0.6);
      line-height: 1.6;
    }

    .done-card.expanded .done-card-answer { display: none; }
    .done-card.expanded .done-card-full-answer { display: block; }

    .done-card-full-answer p { margin: 0 0 8px; }
    .done-card-full-answer p:last-child { margin-bottom: 0; }
    .done-card-full-answer ul, .done-card-full-answer ol { padding-left: 18px; margin: 0 0 8px; }
    .done-card-full-answer li { margin-bottom: 3px; }
    .done-card-full-answer code {
      background: rgba(255,255,255,0.07);
      border-radius: 4px;
      padding: 1px 5px;
      font-size: 11px;
      font-family: monospace;
    }
    .done-card-full-answer pre {
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 8px;
      padding: 10px 12px;
      overflow-x: auto;
      margin: 0 0 8px;
    }
    .done-card-full-answer pre code { background: none; padding: 0; }
    .done-card-full-answer strong { color: rgba(255,255,255,0.85); }
    .done-card-followup-query {
      font-size: 12px;
      color: rgba(255,255,255,0.4);
      margin: 12px 0 6px;
      padding-top: 10px;
      border-top: 1px solid rgba(255,255,255,0.06);
    }
    .done-card-full-answer-block p { margin: 0 0 8px; }
    .done-card-full-answer-block p:last-child { margin-bottom: 0; }
    .done-card-full-answer-block ul, .done-card-full-answer-block ol { padding-left: 18px; margin: 0 0 8px; }
    .done-card-full-answer-block li { margin-bottom: 3px; }

    .done-card-collapse {
      background: none;
      border: none;
      color: rgba(255,255,255,0.2);
      cursor: pointer;
      font-size: 11px;
      padding: 0;
      transition: color 0.15s;
      align-self: flex-start;
    }

    .done-card-collapse:hover { color: rgba(255,255,255,0.55); }

  </style>
</head>
<body>

  <!-- Slider nav + upload -->
  <div style="position:fixed;top:16px;left:50%;transform:translateX(-50%);display:flex;align-items:center;gap:5px;z-index:100;">
    <nav class="slider-nav" style="position:static;transform:none;">
      <button class="slider-tab active" id="tab-new"><i class="fa-regular fa-pen-to-square"></i></button>
      <button class="slider-tab" id="tab-tasks">Tasks</button>
      <button class="slider-tab" id="tab-done">Finished</button>
      <div class="nav-search-divider"></div>
      <div class="search-expand-wrap" id="search-expand-wrap">
        <i class="fa-solid fa-magnifying-glass" style="font-size:11px;color:rgba(255,255,255,0.25);margin-right:8px;margin-left:4px;"></i>
        <input class="nav-search" id="nav-search" type="text" placeholder="Search..." />
      </div>
    </nav>
  </div>

  <!-- Global search results panel -->
  <div class="search-results-panel" id="search-results-panel"></div>

  <!-- Inbound open tasks view -->
  <div id="view-tasks">
    <div class="done-scroll">
      <div class="done-grid" id="tasks-grid"></div>
    </div>
  </div>

  <!-- Finished tasks view -->
  <div id="view-done">
    <div class="done-scroll">
      <div class="done-grid" id="done-grid"></div>
    </div>
  </div>

  <!-- Task view -->
  <div class="main-area visible" id="view-new">
    <div class="command-center" id="command-center">
      <div class="agent-greeting" id="agent-greeting">Hey {{ operator }}, what task needs to be done?</div>
      <div class="command-wrap" id="command-wrap">
        <div id="attach-badge" style="display:none;">
          <i class="fa-solid fa-file" style="font-size:11px;opacity:0.5;"></i>
          <span id="attach-name"></span>
          <button id="remove-attach" title="Remove file"><i class="fa-solid fa-xmark"></i></button>
        </div>
        <div class="input-row">
          <button class="attach-btn" id="upload-btn" title="Attach file"><i class="fa-solid fa-paperclip"></i></button>
          <textarea id="input" placeholder="Tackle your task..." rows="1"></textarea>
          <button class="send-btn" id="send-btn" title="Send"><i class="fa-solid fa-arrow-up"></i></button>
        </div>
      </div>
    </div>
    <div class="results-panel" id="results-panel"></div>
  </div>


<!-- File modal -->
<div class="file-modal" id="file-modal">
  <div class="file-modal-inner">
    <button class="file-modal-close" onclick="closeFileModal()"><i class="fa-solid fa-xmark"></i> Close</button>
    <div id="file-modal-body" style="width:100%;height:100%;overflow:auto;"></div>
  </div>
</div>

<script>
  marked.setOptions({ breaks: true });

  function openFileModal(src) {
    const body = document.getElementById('file-modal-body');
    body.innerHTML = '';
    const iframe = document.createElement('iframe');
    iframe.style.cssText = 'width:100%;height:100%;border:none;';
    iframe.src = src;
    body.appendChild(iframe);
    document.getElementById('file-modal').classList.add('open');
  }

  function closeFileModal() {
    document.getElementById('file-modal').classList.remove('open');
    document.getElementById('file-modal-body').innerHTML = '';
  }

document.getElementById('file-modal').addEventListener('click', (e) => {
    if (e.target === e.currentTarget) closeFileModal();
  });

  // ── Slider ─────────────────────────────────────────────────────────────────

  const tabNew = document.getElementById('tab-new');
  const tabTasks = document.getElementById('tab-tasks');
  const tabDone = document.getElementById('tab-done');
  const navSearchEl = document.getElementById('nav-search');
  const viewNew = document.getElementById('view-new');
  const viewTasks = document.getElementById('view-tasks');
  const viewDone = document.getElementById('view-done');
  const doneGrid = document.getElementById('done-grid');
  const tasksGrid = document.getElementById('tasks-grid');

  let activeTabKey = 'new';

  function setActiveTab(active) {
    [tabNew, tabTasks, tabDone].forEach(t => t.classList.remove('active'));
    [viewNew, viewTasks, viewDone].forEach(v => v.classList.remove('visible'));
    active.tab.classList.add('active');
    active.view.classList.add('visible');
    closeSearch();
  }

  tabNew.addEventListener('click', () => {
    activeTabKey = 'new';
    setActiveTab({ tab: tabNew, view: viewNew });
  });

  tabTasks.addEventListener('click', async () => {
    activeTabKey = 'tasks';
    setActiveTab({ tab: tabTasks, view: viewTasks });
    await loadOpenTasks();
  });

  tabDone.addEventListener('click', async () => {
    activeTabKey = 'done';
    setActiveTab({ tab: tabDone, view: viewDone });
    await loadFinishedTasks();
  });

  // ── Global search index ────────────────────────────────────────────────────

  const searchPanel = document.getElementById('search-results-panel');
  let searchIndex = [];
  let searchFilter = 'all';

  async function buildSearchIndex() {
    try {
      const [finished, open] = await Promise.all([
        window.parent.pywebview.api.activate_tx(JSON.stringify({ handle: 'load_tasks' }), "{{ host }}"),
        window.parent.pywebview.api.activate_tx(JSON.stringify({ handle: 'load_open_tasks' }), "{{ host }}"),
      ]);
      const finishedTasks = (finished?.data?.json?.tasks ?? finished?.json?.tasks ?? []).map(t => ({ ...t, _type: 'finished' }));
      const openTasks = (open?.data?.json?.tasks ?? open?.json?.tasks ?? []).map(t => ({ ...t, _type: 'tasks' }));
      searchIndex = [...finishedTasks, ...openTasks];
    } catch (_) {}
  }

  function closeSearch() {
    navSearchEl.value = '';
    searchPanel.classList.remove('open');
    searchPanel.innerHTML = '';
    searchFilter = 'all';
  }

  function renderSearchResults(q) {
    if (!q) { searchPanel.classList.remove('open'); searchPanel.innerHTML = ''; return; }

    const filtered = searchIndex.filter(t => {
      if (searchFilter !== 'all' && t._type !== searchFilter) return false;
      return (t.query || '').toLowerCase().includes(q) || (t.answer || '').toLowerCase().includes(q);
    }).slice(0, 4);

    searchPanel.innerHTML = '';

    // Filter badges
    const filtersEl = document.createElement('div');
    filtersEl.className = 'search-filters';
    for (const [key, label] of [['all', 'All'], ['finished', 'Finished'], ['tasks', 'Tasks']]) {
      const badge = document.createElement('button');
      badge.className = 'search-filter-badge' + (searchFilter === key ? ' active' : '');
      badge.textContent = label;
      badge.addEventListener('click', (e) => {
        e.stopPropagation();
        searchFilter = key;
        renderSearchResults(navSearchEl.value.trim().toLowerCase());
      });
      filtersEl.appendChild(badge);
    }
    searchPanel.appendChild(filtersEl);

    if (!filtered.length) {
      const empty = document.createElement('div');
      empty.className = 'search-empty';
      empty.textContent = 'No results found.';
      searchPanel.appendChild(empty);
    } else {
      const tagLabel = { finished: 'Finished', tasks: 'Tasks' };
      for (const t of filtered) {
        const item = document.createElement('div');
        item.className = 'search-result-item';
        item.innerHTML = `
          <div class="search-result-tag">${tagLabel[t._type] || t._type}</div>
          <div class="search-result-query">${t.query}</div>
          ${t.answer ? `<div class="search-result-snippet">${t.answer.replace(/\n/g, ' ').slice(0, 100)}</div>` : ''}
        `;
        item.addEventListener('click', () => {
          closeSearch();
          if (t._type === 'finished') {
            setActiveTab({ tab: tabDone, view: viewDone });
            loadFinishedTasks();
          } else if (t._type === 'tasks') {
            setActiveTab({ tab: tabTasks, view: viewTasks });
            loadOpenTasks();
          }
        });
        searchPanel.appendChild(item);
      }
    }
    searchPanel.classList.add('open');
  }

  navSearchEl.addEventListener('input', (e) => {
    renderSearchResults(e.target.value.trim().toLowerCase());
  });

  document.addEventListener('click', (e) => {
    if (!searchPanel.contains(e.target) && e.target !== navSearchEl) closeSearch();
  });

  navSearchEl.addEventListener('keydown', (e) => {
    if (e.key === 'Escape') closeSearch();
  });

  // ── Open tasks (inbound, received from other agents) ────────────────────────

  async function loadOpenTasks() {
    tasksGrid.innerHTML = '<div class="done-loading">Loading...</div>';
    try {
      const result = await window.parent.pywebview.api.activate_tx(
        JSON.stringify({ handle: 'load_open_tasks' }),
        "{{ host }}"
      );
      const tasks = result?.data?.json?.tasks ?? result?.json?.tasks ?? result?.tasks ?? [];
      renderOpenTasks(tasks);
    } catch (e) {
      tasksGrid.innerHTML = '<div class="done-empty">Could not load tasks.</div>';
    }
  }

  function renderOpenTasks(tasks) {
    if (!tasks.length) {
      tasksGrid.innerHTML = '<div class="done-empty">No open tasks.</div>';
      return;
    }
    tasksGrid.innerHTML = '';
    for (const t of tasks) {
      const date = new Date(t.created_at);
      const dateStr = date.toLocaleDateString(undefined, { month: 'short', day: 'numeric' });
      const card = document.createElement('div');
      card.className = 'done-card';
      card.innerHTML = `
        <div class="done-card-query">${t.query}</div>
        <div class="done-card-meta">
          <span>${dateStr} · from ${t.agent_name || 'agent'}</span>
          <button class="open-finish-btn confirm-btn">Open Task</button>
        </div>
      `;

      card.querySelector('.open-finish-btn').addEventListener('click', () => {
        card.remove();
        setActiveTab({ tab: tabNew, view: viewNew });

        const messages = (() => { try { return JSON.parse(t.conversation || '[]'); } catch { return []; } })();
        const suggestions = (() => { try { return JSON.parse(t.suggestions || '[]'); } catch { return []; } })();

        if (messages.length >= 2) {
          const firstUser = messages[0];
          const taskCard = createCard(firstUser.text, [firstUser]);
          taskCard._taskId = t.id;

          for (let i = 1; i < messages.length; i += 2) {
            const agentMsg = messages[i];
            const nextUserMsg = messages[i + 1];
            const isLast = !nextUserMsg;

            if (isLast) {
              // Final turn — setCardDone pushes agentMsg to _exchange internally
              setCardDone(taskCard, agentMsg.text, messages[i - 1]?.text || t.query, t.agent_name || 'Agent', '', suggestions.length ? suggestions : null);
            } else {
              // Intermediate turn — render visually but don't wire up actions
              taskCard._exchange.push(agentMsg);
              const resultEl = document.createElement('div');
              resultEl.innerHTML = `
                <div class="result-tag">&#x2713; Done</div>
                <div class="task-result">${marked.parse(agentMsg.text)}</div>
              `;
              taskCard.querySelector('.task-status')?.replaceWith(resultEl);

              // Render the next user follow-up question
              const followupEl = document.createElement('div');
              followupEl.innerHTML = `
                <div class="task-query" style="margin-top:12px">${nextUserMsg.text}</div>
                <div class="task-divider"></div>
                <div class="task-status"><div class="spinner"></div><span>Thinking...</span></div>
              `;
              taskCard.append(...Array.from(followupEl.children));
              taskCard._exchange.push(nextUserMsg);
            }
          }
        } else {
          const taskCard = createCard(t.query, [{ role: 'user', text: t.query }]);
          taskCard._taskId = t.id;
          setCardDone(taskCard, t.answer || '', t.query, t.agent_name || 'Agent', '', suggestions.length ? suggestions : null);
        }
      });

      tasksGrid.appendChild(card);
    }
  }

  let allTasks = [];

  async function loadFinishedTasks() {
    doneGrid.innerHTML = '<div class="done-loading">Loading...</div>';
    try {
      const result = await window.parent.pywebview.api.activate_tx(
        JSON.stringify({ handle: 'load_tasks' }),
        "{{ host }}"
      );
      allTasks = result?.data?.json?.tasks ?? result?.json?.tasks ?? result?.tasks ?? [];
      renderFinishedTasks(allTasks);
    } catch (e) {
      doneGrid.innerHTML = '<div class="done-empty">Could not load tasks.</div>';
    }
  }

  function renderFinishedTasks(tasks) {
    if (!tasks.length) {
      doneGrid.innerHTML = '<div class="done-empty">No tasks found.</div>';
      return;
    }
    doneGrid.innerHTML = '';
    for (const t of tasks) {
      const date = new Date(t.created_at);
      const dateStr = date.toLocaleDateString(undefined, { month: 'short', day: 'numeric' });
      const card = document.createElement('div');
      const messages = (() => { try { return JSON.parse(t.conversation || '[]'); } catch { return []; } })();
      const fullAnswerHtml = messages.length >= 2
        ? messages.map((m, idx) => {
            if (m.role === 'user' && idx > 0) {
              return `<div class="done-card-followup-query">${m.text}</div>`;
            } else if (m.role === 'agent') {
              return `<div class="done-card-full-answer-block">${marked.parse(m.text)}</div>`;
            }
            return '';
          }).join('')
        : marked.parse(t.answer);

      card.className = 'done-card';
      card.innerHTML = `
        <div class="done-card-query">${t.query}</div>
        <div class="done-card-answer">${t.answer}</div>
        <div class="done-card-full-answer">${fullAnswerHtml}</div>
        <div class="done-card-meta">
          <span>${dateStr}</span>
          <button class="done-card-collapse" style="display:none;">Collapse ↑</button>
        </div>
      `;

      const collapseBtn = card.querySelector('.done-card-collapse');

      card.addEventListener('click', (e) => {
        if (e.target === collapseBtn) return;
        if (card.classList.contains('expanded')) return;
        card.classList.add('expanded');
        collapseBtn.style.display = 'inline';
      });

      collapseBtn.addEventListener('click', () => {
        card.classList.remove('expanded');
        collapseBtn.style.display = 'none';
      });

      doneGrid.appendChild(card);
    }
  }

  const feedEl = document.getElementById('results-panel');
  const inputEl = document.getElementById('input');
  const sendBtn = document.getElementById('send-btn');
  const agentGreeting = document.getElementById('agent-greeting');
  const commandCenter = document.getElementById('command-center');
  let activeCard = null;

  function dockInput() {
    commandCenter.classList.add('docked');
    feedEl.classList.add('has-results');
    agentGreeting.style.display = 'none';
  }

  function undockInput() {
    commandCenter.classList.remove('docked');
    feedEl.classList.remove('has-results');
    agentGreeting.style.display = '';
  }

  function updateGreeting() {
    if (!feedEl.querySelector('.task-card')) undockInput();
  }

  // ── Task card factory ──────────────────────────────────────────────────────

  function createCard(query, exchange = null, taskId = null) {
    const card = document.createElement('div');
    card.className = 'task-card active';
    card.innerHTML = `
      <div class="task-query">${query}</div>
      <div class="task-divider"></div>
      <div class="task-status"><div class="spinner"></div><span>Thinking...</span></div>
    `;
    card._exchange = exchange ?? [{ role: 'user', text: query }];
    feedEl.appendChild(card);
    feedEl.scrollTop = feedEl.scrollHeight;
    dockInput();
    return card;
  }

  function setCardWorking(card) {
    const status = document.createElement('div');
    status.className = 'task-status';
    status.innerHTML = `<div class="spinner"></div><span>Working...</span>`;
    const target = card.querySelector('.suggestion-row, .suggestions-list, .task-status');
    if (target) target.replaceWith(status);
    else card.appendChild(status);
  }

  function renderFile({ name, data, mime }) {
    const title = name ? `<div class="file-name">${name}</div>` : '';
    if (mime === 'text/csv') {
      const rows = data.trim().split('\n').map(r => r.split(','));
      const header = rows[0].map(h => `<th>${h}</th>`).join('');
      const body = rows.slice(1).map(r => `<tr>${r.map(c => `<td>${c}</td>`).join('')}</tr>`).join('');
      return `${title}<div class="task-csv-preview"><table><thead><tr>${header}</tr></thead><tbody>${body}</tbody></table></div>`;
    }
    if (mime.startsWith('image/')) return `${title}<img class="task-image-preview" src="data:${mime};base64,${data}" alt="" />`;
    const label = mime.split('/')[1].toUpperCase();
    return `${title}<div class="task-file-card" onclick="openFileModal('data:${mime};base64,${data}')"><i class="fa-regular fa-file"></i><span>${name || label} — click to open</span><i class="fa-solid fa-arrow-up-right-from-square"></i></div>`;
  }

  function setCardDone(card, answer, query, agentName, context = '', suggestions = null, files = null) {
    card.classList.remove('active');
    card._exchange.push({ role: 'agent', text: answer });


    const filesHtml = files?.length ? files.map(renderFile).join('') : '';

    const resultEl = document.createElement('div');
    resultEl.innerHTML = `
      <div class="result-tag">&#x2713; Done</div>
      <div class="task-result">${marked.parse(answer)}</div>
      ${filesHtml}
    `;
    card.querySelector('.task-status')?.replaceWith(resultEl);

    if (suggestions?.length) {
      const suggestionsEl = document.createElement('div');
      suggestionsEl.className = 'suggestions-list';
      suggestionsEl.innerHTML = `<div style="font-size:11px;color:rgba(255,255,255,0.25);margin-bottom:4px;">Or delegate to an agent</div>`;
      for (const suggestion of suggestions) {
        const logoContent = suggestion.logo ? `<img src="${suggestion.logo}" alt="" />` : '&#x1F916;';
        const isVerified = suggestion.verified == 1;
        const verifiedBadge = isVerified
          ? `<span class="verified-badge"><i class="fa-solid fa-circle-check"></i> Verified</span>`
          : `<span class="unverified-badge"><i class="fa-solid fa-triangle-exclamation"></i> Not verified</span>`;
        const row = document.createElement('div');
        row.className = 'suggestion-row';
        row.innerHTML = `
          <div class="suggestion-agent">
            <div class="agent-logo">${logoContent}</div>
            <div class="agent-info">
              <div class="agent-name-row">
                <span class="agent-name">${suggestion.agent_name}</span>
                ${verifiedBadge}
              </div>
              <div class="agent-sub">${[suggestion.author, suggestion.creator].filter(Boolean).join(' · ')}</div>
              <div class="agent-sub">${suggestion.description || suggestion.handle}</div>
            </div>
          </div>
          <div class="suggestion-actions">
            <button class="confirm-btn">Consult Agent</button>
          </div>
        `;
        row.querySelector('.confirm-btn').addEventListener('click', async () => {
          card._suggestion = suggestion;
          suggestionsEl.remove();
          setCardWorking(card);
          card.classList.add('active');
          const userMsg = { role: 'user', text: `[Consulted ${suggestion.agent_name}] ${query}` };
          const { answer: newAnswer, files: newFiles } = await runSuperviseTask(suggestion, query, context);
          if (card._taskId) {
            window.parent.pywebview.api.activate_tx(
              JSON.stringify({ handle: 'append_messages', task_id: card._taskId, messages: [userMsg, { role: 'agent', text: newAnswer }] }),
              "{{ host }}"
            ).catch(() => {});
          }
          card._exchange.push(userMsg);
          setCardDone(card, newAnswer, query, suggestion.agent_name, context, null, newFiles);
        });
        suggestionsEl.appendChild(row);
      }
      card.appendChild(suggestionsEl);
    }

    activeCard = { card, answer, context, agentName };
    inputEl.placeholder = 'Follow up or mark as finished...';

    card.querySelector('.result-actions')?.remove();

    const actionsEl = document.createElement('div');
    actionsEl.className = 'result-actions';
    actionsEl.innerHTML = `
      <button class="copy-btn" title="Copy answer"><i class="fa-regular fa-copy"></i> Copy</button>
      <button class="close-btn">Finish Task</button>
    `;

    actionsEl.querySelector('.copy-btn').addEventListener('click', async (e) => {
      const btn = e.currentTarget;
      const parts = [answer];
      if (files?.length) {
        for (const f of files) {
          if (f.mime === 'text/csv') {
            const rows = f.data.trim().split('\n').map(r => r.split(',').map(c => c.trim()));
            const header = `| ${rows[0].join(' | ')} |`;
            const divider = `| ${rows[0].map(() => '---').join(' | ')} |`;
            const body = rows.slice(1).map(r => `| ${r.join(' | ')} |`).join('\n');
            parts.push(`\n**${f.name || 'Table'}**\n\n${header}\n${divider}\n${body}`);
          } else if (f.mime.startsWith('text/')) {
            parts.push(`\n**${f.name || f.mime}**\n${f.data}`);
          }
        }
      }
      await navigator.clipboard.writeText(parts.join('\n'));
      btn.classList.add('copied');
      btn.innerHTML = '<i class="fa-solid fa-check"></i> Copied';
      setTimeout(() => {
        btn.classList.remove('copied');
        btn.innerHTML = '<i class="fa-regular fa-copy"></i> Copy';
      }, 2000);
    });

    actionsEl.querySelector('.close-btn').addEventListener('click', async () => {
      activeCard = null;
      inputEl.placeholder = 'Tackle your task...';
      card.remove();
      updateGreeting();
      try {
        if (card._taskId) {
          await window.parent.pywebview.api.activate_tx(
            JSON.stringify({ handle: 'finish_task', task_id: card._taskId, answer }),
            "{{ host }}"
          );
        }
      } catch (_) {}
      buildSearchIndex();
    });

    card.appendChild(actionsEl);
  }

  function setCardError(card, message) {
    card.classList.remove('active');
    const status = card.querySelector('.task-status, .suggestion-row');
    if (status) {
      status.className = 'task-status';
      status.innerHTML = `<span style="color:rgba(248,113,113,0.7)">${message}</span>`;
    }
  }

  // ── Send ───────────────────────────────────────────────────────────────────

  async function send() {
    const query = inputEl.value.trim();
    if (!query) return;

    inputEl.value = '';
    inputEl.style.height = 'auto';
    sendBtn.disabled = true;

    // Follow-up on active card
    if (activeCard) {
      const { card, answer: prevAnswer, context: prevContext, agentName } = activeCard;
      const combinedContext = `Previous result:\n${prevAnswer}\n\nOriginal task context:\n${prevContext}`;
      card._exchange.push({ role: 'user', text: query });
      card.querySelector('.result-actions')?.remove();
      card.querySelector('.suggestions-list')?.remove();
      activeCard = null;
      inputEl.placeholder = 'Tackle your task...';
      setCardWorking(card);
      card.classList.add('active');
      try {
        const savedSuggestion = card._suggestion;
        if (savedSuggestion) {
          const { answer: newAnswer, files: newFiles } = await runSuperviseTask(savedSuggestion, query, combinedContext);
          if (card._taskId) {
            window.parent.pywebview.api.activate_tx(
              JSON.stringify({ handle: 'append_messages', task_id: card._taskId, messages: [{ role: 'user', text: query }, { role: 'agent', text: newAnswer }] }),
              "{{ host }}"
            ).catch(() => {});
          }
          setCardDone(card, newAnswer, query, agentName, combinedContext, null, newFiles);
        } else {
          const result = await window.parent.pywebview.api.activate_tx(
            JSON.stringify({ handle: 'get_followup', query, context: combinedContext, task_id: card._taskId }),
            "{{ host }}"
          );
          const json = result?.data?.json ?? result?.json ?? result ?? {};
          setCardDone(card, json?.answer ?? JSON.stringify(json), query, agentName, combinedContext);
        }
      } catch (e) {
        setCardError(card, `Error: ${e.message || e}`);
      } finally {
        sendBtn.disabled = true;
        inputEl.focus();
      }
      return;
    }

    const attachment = pendingAttachment;
    clearAttachment();

    const contextParts = [];
    if (attachment) contextParts.push(`File: ${attachment.filename}\n\n${attachment.context}`);

    const card = createCard(attachment ? `${query}  [${attachment.filename}]` : query);

    try {
      const result = await window.parent.pywebview.api.activate_tx(
        JSON.stringify({
          handle: 'get_answer',
          query,
          context: contextParts.join('\n\n'),
        }),
        "{{ host }}"
      );

      const json = result?.data?.json ?? result?.json ?? result ?? {};
      const answer = json?.answer ?? JSON.stringify(json);
      const suggestions = json?.suggestions?.length ? json.suggestions : null;
      if (json?.task_id) card._taskId = json.task_id;
      setCardDone(card, answer, query, 'Team Agent', '', suggestions);
    } catch (e) {
      setCardError(card, `Error: ${e.message || e}`);
    } finally {
      sendBtn.disabled = true;
      inputEl.focus();
    }
  }

  // ── Confirm task ───────────────────────────────────────────────────────────

  async function runSuperviseTask(suggestion, query, context = '') {
    try {
      const result = await window.parent.pywebview.api.activate_tx(
        JSON.stringify({ handle: suggestion.handle, agent_id: suggestion.agent_id, query, context }),
        suggestion.creator
      );
      const json = result?.data?.json ?? result?.json ?? result ?? {};
      return { answer: json?.answer ?? JSON.stringify(result), files: json?.files ?? null };
    } catch (e) {
      return { answer: `Error: ${e.message || e}`, files: null };
    }
  }

  // ── File attachment ────────────────────────────────────────────────────────

  const uploadBtn = document.getElementById('upload-btn');
  const attachBadge = document.getElementById('attach-badge');
  const attachName = document.getElementById('attach-name');
  let pendingAttachment = null;

  document.getElementById('remove-attach').addEventListener('click', clearAttachment);

  function setAttachmentBadge(filename) {
    attachName.textContent = filename;
    attachBadge.style.display = 'flex';
  }

  function clearAttachment() {
    pendingAttachment = null;
    attachBadge.style.display = 'none';
    attachName.textContent = '';
  }

  uploadBtn.addEventListener('click', async () => {
    uploadBtn.disabled = true;
    try {
      const dialogResult = await window.parent.pywebview.api.open_file_dialog(false, true);
      if (!dialogResult?.paths?.length) return;
      const result = await window.parent.pywebview.api.activate_tx(
        JSON.stringify({ handle: 'read_file', filename: dialogResult.filename, content: dialogResult.content }),
        "{{ host }}"
      );
      const context = result?.data?.json?.context ?? result?.json?.context ?? result?.context ?? '';
      if (context) {
        pendingAttachment = { filename: dialogResult.filename, context };
        setAttachmentBadge(dialogResult.filename);
        inputEl.focus();
      }
    } finally {
      uploadBtn.disabled = false;
    }
  });


  // ── Init ───────────────────────────────────────────────────────────────────

  setActiveTab({ tab: tabNew, view: viewNew });
  buildSearchIndex();


  sendBtn.disabled = true;

  sendBtn.addEventListener('click', send);

  inputEl.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); send(); }
  });

  inputEl.addEventListener('input', () => {
    inputEl.style.height = 'auto';
    inputEl.style.height = inputEl.scrollHeight + 'px';
    sendBtn.disabled = !inputEl.value.trim();
  });


</script>

</body>
